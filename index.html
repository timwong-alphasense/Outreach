<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      margin: 0;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
    }
    .success { color: #2e7d32; }
    .error   { color: #c62828; }
  </style>
</head>
<body>
  <button id="btn" disabled>Loading...</button>
  <div id="status"></div>

  <script type="module">
    // Outreach extensibility SDK — receives account context via postMessage
    import sdk from 'https://cdn.jsdelivr.net/npm/@getoutreach/extensibility-sdk/dist/index.min.js';

    // ↓ Replace with your actual REST endpoint
    const TARGET_URL = 'https://your-api.example.com/trigger';

    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    let accountId, accountName;

    // Initialize: Outreach passes account context after the SDK handshake.
    // Falls back after 3 s so the button works when opened outside Outreach (local dev).
    const sdkTimeout = new Promise(resolve => setTimeout(resolve, 3000));

    Promise.race([sdk.init(), sdkTimeout]).then(ctx => {
      accountId   = ctx?.account?.id   ?? null;
      accountName = ctx?.account?.name ?? null;
      btn.textContent = 'Run Action';
      btn.disabled    = false;
      if (!accountId) {
        status.textContent = '(no Outreach context — account ID will be null)';
        status.className   = '';
      }
    }).catch(() => {
      btn.textContent = 'Run Action';
      btn.disabled    = false;
      status.textContent = 'Could not load account context.';
      status.className   = 'error';
    });

    btn.addEventListener('click', async () => {
      btn.disabled       = true;
      status.textContent = '';
      status.className   = '';

      try {
        const resp = await fetch(TARGET_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ account_id: accountId, account_name: accountName }),
        });

        if (resp.ok) {
          status.textContent = '✓ Success!';
          status.className   = 'success';
        } else {
          const text = await resp.text();
          status.textContent = `✗ Error ${resp.status}: ${text}`;
          status.className   = 'error';
        }
      } catch (err) {
        status.textContent = `✗ Network error: ${err.message}`;
        status.className   = 'error';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
