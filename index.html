<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      margin: 0;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
    }
    .success { color: #2e7d32; }
    .error   { color: #c62828; }
  </style>
</head>
<body>
  <button id="btn">Pull the latest generative insights for the account.</button>
  <div id="status"></div>

  <script>
    // Outreach passes context as URL params: ?acc.id=1664&acc.name=Acme&theme=Light&loc=en
    const params    = new URLSearchParams(window.location.search);
    const accountId = params.get('acc.id');

    // ↓ Replace with your actual REST endpoint
    const TARGET_URL = 'https://your-api.example.com/trigger';

    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      btn.disabled       = true;
      status.textContent = '';
      status.className   = '';

      try {
        const resp = await fetch(TARGET_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ account_id: accountId }),
        });

        if (resp.ok) {
          status.textContent = '✓ Success!';
          status.className   = 'success';
        } else {
          const text = await resp.text();
          status.textContent = `✗ Error ${resp.status}: ${text}`;
          status.className   = 'error';
        }
      } catch (err) {
        status.textContent = `✗ Network error: ${err.message}`;
        status.className   = 'error';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
